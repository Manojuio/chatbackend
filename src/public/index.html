<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Chat Hub</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04070d;
      --panel: rgba(9, 14, 23, 0.92);
      --panel-2: rgba(16, 23, 35, 0.96);
      --accent: #5efce8;
      --accent-2: #7b61ff;
      --text: #edf6ff;
      --muted: #a6b8d8;
      --success: #7cf7b2;
      --danger: #ff7b9c;
      --glow: rgba(94, 252, 232, 0.18);
    }
    * { box-sizing: border-box; font-family: "Segoe UI", Arial, Helvetica, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(123, 97, 255, 0.08), transparent 18%),
        radial-gradient(circle at 20% 20%, rgba(94, 252, 232, 0.08), transparent 20%),
        linear-gradient(145deg, #02040a 0%, #060b13 45%, #010308 100%);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.96));
      pointer-events: none;
      opacity: 0.35;
    }
    .shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(4, 7, 13, 0.95), rgba(7, 11, 18, 0.98));
      backdrop-filter: blur(14px);
      box-shadow: inset -1px 0 0 rgba(94, 252, 232, 0.04), 10px 0 30px rgba(0, 0, 0, 0.35);
    }
    .panel {
      background: linear-gradient(180deg, rgba(10, 15, 24, 0.96), rgba(14, 20, 32, 0.98));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(94, 252, 232, 0.04), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    h1, h2, h3 { margin-top: 0; }
    .badge { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 0.22em; text-shadow: 0 0 10px rgba(94, 252, 232, 0.35); }
    .field { display: grid; gap: 6px; margin-top: 10px; }
    label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; }
    input, button {
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(7, 11, 18, 0.95);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 8px 18px rgba(0,0,0,0.25);
    }
    input:focus {
      outline: none;
      border-color: rgba(94, 252, 232, 0.45);
      box-shadow: 0 0 0 3px rgba(94, 252, 232, 0.12), 0 0 24px rgba(94, 252, 232, 0.12);
    }
    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #02050a;
      font-weight: 800;
      border: none;
      transition: transform 0.08s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 24px rgba(94, 252, 232, 0.16), 0 0 0 1px rgba(255,255,255,0.05) inset;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(123, 97, 255, 0.18); }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .mini { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .chat-wrap { display: flex; flex-direction: column; padding: 24px; gap: 18px; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; }
    .status { color: var(--success); font-size: 13px; }
    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(94, 252, 232, 0.35) transparent;
    }
    .bubble {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(17, 25, 39, 0.98), rgba(13, 18, 29, 0.98));
      border: 1px solid rgba(94, 252, 232, 0.08);
      box-shadow: 0 12px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .bubble.me {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(94, 252, 232, 0.16), rgba(123, 97, 255, 0.18));
      border-color: rgba(123, 97, 255, 0.2);
      box-shadow: 0 16px 30px rgba(123, 97, 255, 0.16), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .bubble small { display: block; color: var(--muted); margin-top: 6px; }
    .composer { display: flex; gap: 10px; align-items: center; }
    .composer input { flex: 1; }
    .empty-state { color: var(--muted); text-align: center; padding: 24px 0; text-shadow: 0 0 12px rgba(94, 252, 232, 0.06); }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .bubble { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="panel">
        <p class="badge">Realtime chat</p>
        <h1>Chat Hub</h1>
        <p class="mini">Start a private one-to-one chat by entering your name and the other person’s name.</p>

        <div class="field">
          <label for="userId">Your name</label>
          <input id="userId" type="text" placeholder="Alex" />
        </div>
        <div class="field">
          <label for="partnerId">Chat with</label>
          <input id="partnerId" type="text" placeholder="Sam" />
        </div>
        <div class="row" style="margin-top: 10px;">
          <button id="joinBtn" type="button">Join chat</button>
          <button id="clearBtn" type="button" style="background: #1f2937; color: #e5eefb;">Clear chat</button>
        </div>
        <p id="statusText" class="mini">Status: waiting for a private chat.</p>
      </div>
    </aside>

    <main class="chat-wrap">
      <header class="chat-header">
        <div>
          <h2 id="roomLabel">Live conversation</h2>
          <p id="roomHint" class="mini">Enter your name and the other person’s name to start a private one-to-one chat.</p>
        </div>
        <span class="status" id="connectionStatus">● Connected</span>
      </header>

      <section class="panel" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
        <div id="history" class="mini"></div>
        <div id="messages" class="messages"></div>
      </section>

      <section class="panel">
        <div class="composer">
          <input id="messageInput" type="text" placeholder="Type a message and press Enter" />
          <button id="sendBtn" type="button">Send</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const socket = io();
    let currentConvId = null;

    function buildDirectRoom(userA, userB) {
      const a = userA.trim().toLowerCase();
      const b = userB.trim().toLowerCase();
      return [a, b].sort().join('_');
    }

    const messagesEl = document.getElementById('messages');
    const historyEl = document.getElementById('history');
    const statusText = document.getElementById('statusText');
    const roomLabel = document.getElementById('roomLabel');
    const roomHint = document.getElementById('roomHint');
    const connectionStatus = document.getElementById('connectionStatus');

    function addBubble(msg, isMine = false) {
      const bubble = document.createElement('article');
      bubble.className = `bubble ${isMine ? 'me' : ''}`;
      bubble.innerHTML = `<strong>${msg.senderId}</strong><div>${msg.content}</div><small>${new Date(msg.createdAt || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</small>`;
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function resetMessages() {
      messagesEl.innerHTML = '<div class="empty-state">No messages yet. Send the first message to start the conversation.</div>';
    }

    socket.on('connect', () => {
      connectionStatus.textContent = '● Connected';
      connectionStatus.style.color = '#4ade80';
    });

    socket.on('disconnect', () => {
      connectionStatus.textContent = '● Reconnecting';
      connectionStatus.style.color = '#fbbf24';
    });

    socket.on('receive_message', (msg) => {
      addBubble(msg, msg.senderId === document.getElementById('userId').value.trim());
    });

    document.getElementById('joinBtn').addEventListener('click', () => {
      const senderId = document.getElementById('userId').value.trim();
      const partnerId = document.getElementById('partnerId').value.trim();
      if (!senderId) return alert('Enter your name first.');
      if (!partnerId) return alert('Enter the other person’s name first.');

      const convId = buildDirectRoom(senderId, partnerId);
      currentConvId = convId;
      roomLabel.textContent = `Private chat: ${senderId} ↔ ${partnerId}`;
      roomHint.textContent = `Room ID: ${convId}`;
      statusText.textContent = `Status: connected to ${senderId} and ${partnerId}`;
      resetMessages();
      historyEl.innerHTML = 'Loading previous messages...';

      socket.emit('join_conversation', convId);
      fetch(`/api/messages/${convId}`)
        .then((res) => res.json())
        .then((messages) => {
          historyEl.innerHTML = messages.length ? `<strong>Previous messages:</strong> ${messages.length}` : 'No previous messages in this room yet.';
          messagesEl.innerHTML = '';
          messages.forEach((msg) => addBubble(msg, msg.senderId === senderId));
        })
        .catch(() => {
          historyEl.textContent = 'Unable to load history right now.';
        });
    });

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const senderId = document.getElementById('userId').value.trim();
      const content = document.getElementById('messageInput').value.trim();
      if (!currentConvId || !senderId || !content) {
        alert('Join a private chat and enter your name before sending.');
        return;
      }

      socket.emit('send_message', { conversationId: currentConvId, senderId, content });
      document.getElementById('messageInput').value = '';
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      messagesEl.innerHTML = '<div class="empty-state">Chat cleared locally. Join the same room again to reload history.</div>';
    });

    resetMessages();
  </script>
</body>
</html>
